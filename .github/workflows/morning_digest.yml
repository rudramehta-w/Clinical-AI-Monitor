name: Daily Clinical AI Digest

on:
  schedule:
    # Runs at 02:00 UTC (7:30 AM IST) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # This line adds a "Run Now" button on GitHub for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Dependencies
        run: uv sync

      - name: Execute Autonomous Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: uv run src/main_pipeline.py